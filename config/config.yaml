# FS_MPRA Pipeline Configuration
# ================================
# Edit this file to define samples and pipeline parameters.
# Then run: snakemake --cores <N>

# Reference FASTA used for alignment (required)
reference_fasta: null  # e.g., /path/to/reference.fa

# Sample definitions
# Each sample needs at minimum a BAM path.
# Per-sample overrides (e.g., promoter_region) take precedence over defaults.
samples:
  # Example:
  # SampleA:
  #   bam: /path/to/sampleA.bam
  #   promoter_region: "PlasmidName:3184-3501"  # optional per-sample override
  #   barcode_region: "3502-3516"                # optional per-sample override

# ---------------------------------------------------------------------------
# Stage 1: Filter reads (01_filter_reads.py)
# ---------------------------------------------------------------------------
methylation_range: null          # [min, max] or null to use per-type defaults
genomic_methylation_range:
  - 0.1
  - 1.0
plasmid_methylation_range:
  - 0.1
  - 1.0
length_range:
  - 50
  - 50
exact_alignment: true
skip_methylation: false
write_genomic: false             # Write genomic reads to a separate BAM

# ---------------------------------------------------------------------------
# Stage 2: Call variants (02_call_variants.py)
# ---------------------------------------------------------------------------
promoter_region: null             # e.g., "PlasmidName:3184-3501" (required)
barcode_region: null              # e.g., "3502-3516" or null to skip
no_barcode: false
snv_only: false
min_base_quality: 20
max_edit_distance: 2

# ---------------------------------------------------------------------------
# Stage 3: Analyze library (03_analyze_library.py)
# ---------------------------------------------------------------------------
target_region: null               # e.g., "PlasmidName:3100-3600" or null
analysis_promoter_region: null    # e.g., "3184-3501" (START-END within target)
min_reads: 50
n_null_iterations: 10000          # null subsamples B (common to all variants)
null_stratify: false              # OPT-IN speed mode; NOT calibrated (~2x
                                  # anti-conservative). Leave false for
                                  # trustworthy FDR (validated config).
null_strata_n_tol: 0.10           # (only used if null_stratify: true)
null_strata_nc_dist: 0.30         # (only used if null_stratify: true)
nuc_range: null                   # [min, max] or null for no filter

# TF binding-motif layer (Phase 2 / plan §2.3).
# Reuses reference_fasta (top of file) for motif DNA extraction.
motif_bins: "TF,sub_TF"           # bins searched for motif clusters
motif_direction: loss             # loss | gain | both
motif_sign_consistency: 0.90      # min same-sign fraction in a cluster
motif_min_width: 5                # min motif-cluster width (bp)
motif_max_width: 25               # max motif-cluster width (bp)
motif_require_variant_overlap: false  # require cluster to span its SNV
motif_fdr: 0.10                   # variant FDR gate feeding aggregation
motif_density_threshold: 2        # >= N distinct variants -> motif call

# Protein co-occupancy dependency (Phase 3 / plan §2.4–2.5).
# OFF by default. Calibrated (P3.6 WT-vs-WT PASS, exact FDR) but
# conservative power on sparse-footprint data — interpret with the
# emitted `underpowered`/`mde` columns. Requires the motif layer.
enable_co_occupancy: false
cooccupancy_n_iter: 10000              # bootstrap iterations
cooccupancy_site_occupancy_frac: 0.5   # read occupies a site if >= frac
cooccupancy_site_merge_overlap: 0.5    # merge same-bin site intervals
cooccupancy_min_site_separation: 30    # min bp gap site1<->site2
cooccupancy_min_variant_instruments: 3 # min independent SNVs per site1
cooccupancy_min_stratum: 25            # min WT reads per O1 stratum
cooccupancy_call_q: 0.10               # BH q to call a dependency
cooccupancy_min_consistency: 0.70      # sign-agreement frac to call
cooccupancy_secondary_screen: true     # §2.5 secondary-mutation control
cooccupancy_secondary_window: 10       # bp pad around site2 for it

threads: 8
