[project]
name = "fs-mpra"
version = "0.2.0"
description = "Fiber-seq MPRA saturation mutagenesis Snakemake pipeline"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
# bioinformatics
pysam = ">=0.22"
samtools = ">=1.19"
# scientific
numpy = ">=1.24"
scipy = ">=1.10"
h5py = ">=3.8"
# plotting
matplotlib = ">=3.7"
seaborn = ">=0.12"
# workflow
snakemake = ">=8"
# misc
tqdm = ">=4.64"

[pypi-dependencies]
# pyft removed — 01_filter_reads.py now reads mg/as/al tags directly via pysam

[feature.browser.dependencies]
plotly = ">=5.0"
pandas = ">=2.0"

[feature.browser.pypi-dependencies]
dash = ">=2.0"

[environments]
default = { solve-group = "default" }
browser = { features = ["browser"], solve-group = "default" }

[tasks]
dry-run = "snakemake -n"
run = "snakemake --cores 8"
